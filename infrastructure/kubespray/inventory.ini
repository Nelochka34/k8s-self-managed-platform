# This inventory describe a HA typology with stacked etcd (== same nodes as control plane)
# and 3 worker nodes
# See https://docs.ansible.com/ansible/latest/inventory_guide/intro_inventory.html
# for tips on building your # inventory

# Configure 'ip' variable to bind kubernetes services on a different ip than the default iface
# We should set etcd_member_name for etcd cluster. The node that are not etcd members do not need to set the value,
# or can set the empty string value.
[all]
cp-1 ansible_host=84.252.140.51 ip=10.129.0.21 ansible_user=el_maksimenko ansible_ssh_private_key_file=~/.ssh/id_rsa
cp-2 ansible_host=89.169.178.122 ip=10.129.0.26 ansible_user=el_maksimenko ansible_ssh_private_key_file=~/.ssh/id_rsa
cp-3 ansible_host=84.201.143.60 ip=10.129.0.3 ansible_user=el_maksimenko ansible_ssh_private_key_file=~/.ssh/id_rsa
worker-1 ansible_host=89.169.188.52 ip=10.129.0.8 ansible_user=el_maksimenko ansible_ssh_private_key_file=~/.ssh/id_rsa
worker-2 ansible_host=111.88.151.83 ip=10.129.0.17 ansible_user=el_maksimenko ansible_ssh_private_key_file=~/.ssh/id_rsa

[kube_control_plane]
cp-1
cp-2
cp-3

[etcd]
cp-1
cp-2
cp-3

[kube_node]
worker-1
worker-2

[k8s_cluster:children]
kube_control_plane
kube_node
